<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal — Estimio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0118;
      color: #e2d9f3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      color: #a14ef9;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 14px;
      color: #5a3880;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }
    a {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #1e0530;
      border: 1px solid #3d1860;
      border-radius: 16px;
      padding: 18px 20px;
      text-decoration: none;
      color: #f0f0ff;
      font-size: 15px;
      font-weight: 600;
      transition: border-color 0.15s;
    }
    a:hover { border-color: #a14ef9; }
    .icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(161,78,249,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .arrow { margin-left: auto; color: #5a3880; font-size: 18px; }
  </style>
</head>
<body>
  <div class="logo">Estimio</div>
  <div class="sub">Legal documents</div>
  <div class="links">
    <a href="privacy-policy.html">
      <div class="icon">🔒</div>
      Privacy Policy
      <span class="arrow">›</span>
    </a>
    <a href="terms.html">
      <div class="icon">📄</div>
      Terms of Use
      <span class="arrow">›</span>
    </a>
  </div>
</body>
</html>
